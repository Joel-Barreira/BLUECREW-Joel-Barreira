services:
  backend:
    build: 
      context: ./Backend-Spring-Boot/Bluecrew-api/api
    container_name: spring-api
    networks:
      - app-network
    volumes:
      - uploads_volume:/app/uploads
    restart: always


  frontend:
    build: 
      context: ./Frontend-Angular
    container_name: angular-web
    networks:
      - app-network
    restart: always
    depends_on:
      - backend


  nginx-proxy:
    image: nginx:alpine
    container_name: bluecrew_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_volume:/data/uploads:ro 
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  uploads_volume: