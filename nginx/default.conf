server {
    listen 80;
    server_name _; # Acepta cualquier IP o nombre (evita problemas si la IP cambia)

    # 1. Configuración para las IMÁGENES (Uploads)
    location /uploads/ {
        alias /data/uploads/;
        add_header Access-Control-Allow-Origin *;
        autoindex off;
    }

    # 2. Configuración para el BACKEND (Spring Boot)
    location /api {
        proxy_pass http://spring-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. Configuración para el FRONTEND (React)
    location / {
        proxy_pass http://react-web:80; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}