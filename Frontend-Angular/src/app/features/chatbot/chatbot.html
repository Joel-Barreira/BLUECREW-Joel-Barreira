<!-- Floating Button -->
<button class="chatbot-toggle btn-primary" (click)="toggleChat()" [class.hidden]="isOpen()">
  <lucide-icon [img]="MessageCircle" size="24"></lucide-icon>
</button>

<!-- Chat Window -->
<div class="chatbot-window glass-panel" [class.open]="isOpen()">
  <div class="chat-header">
    <div class="header-info">
      <lucide-icon [img]="MessageCircle" size="20"></lucide-icon>
      <span>Soporte BLUECREW</span>
    </div>
    <button class="btn-close" (click)="toggleChat()">
      <lucide-icon [img]="X" size="20"></lucide-icon>
    </button>
  </div>

  <div class="chat-body" #chatBody>
    @for (msg of messages(); track msg.time) {
      <div class="message" [class.user-message]="msg.sender === 'user'" [class.bot-message]="msg.sender === 'bot'">
        <div class="msg-bubble">
          {{ msg.text }}
          
          @if (msg.link) {
            <a [routerLink]="msg.link.url" class="msg-link" (click)="toggleChat()">
              <lucide-icon [img]="ExternalLink" size="14"></lucide-icon>
              {{ msg.link.label }}
            </a>
          }
        </div>
        <div class="msg-time">{{ msg.time | date:'shortTime' }}</div>
      </div>
    }
  </div>

  <div class="chat-input-area">
    <input 
      type="text" 
      class="input-field chat-input" 
      placeholder="Escribe un mensaje..."
      [ngModel]="inputText()" 
      (ngModelChange)="inputText.set($event)"
      (keyup.enter)="sendMessage()"
    >
    <button class="btn-send" (click)="sendMessage()" [disabled]="!inputText().trim()">
      <lucide-icon [img]="Send" size="18"></lucide-icon>
    </button>
  </div>
</div>
