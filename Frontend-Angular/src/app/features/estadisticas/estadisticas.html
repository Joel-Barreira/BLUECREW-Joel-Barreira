<div class="page-header d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3 mb-4">
  <h1 class="h2 text-gradient mb-0">Estadísticas</h1>
</div>

<div class="row g-4 mb-5">
  <!-- Card: Voluntarios -->
  <div class="col-md-4">
    <div class="card card-premium p-4 d-flex flex-row align-items-center gap-4 animate-fade-in border-0 shadow-sm" style="animation-delay: 0.1s">
      <div class="rounded-3 bg-primary bg-opacity-10 text-primary d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
        <lucide-icon [img]="Users" size="28"></lucide-icon>
      </div>
      <div>
        <div class="h3 fw-bold mb-0">{{ stats()?.Voluntarios_Activos || 0 | number }}</div>
        <div class="text-muted small fw-medium">Voluntarios Activos</div>
      </div>
    </div>
  </div>

  <!-- Card: Eventos -->
  <div class="col-md-4">
    <div class="card card-premium p-4 d-flex flex-row align-items-center gap-4 animate-fade-in border-0 shadow-sm" style="animation-delay: 0.2s">
      <div class="rounded-3 bg-secondary bg-opacity-10 text-secondary d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
        <lucide-icon [img]="CalendarDays" size="28"></lucide-icon>
      </div>
      <div>
        <div class="h3 fw-bold mb-0">{{ stats()?.Eventos_Finalizados || 0 }}</div>
        <div class="text-muted small fw-medium">Eventos Finalizados</div>
      </div>
    </div>
  </div>

  <!-- Card: Residuos -->
  <div class="col-md-4">
    <div class="card card-premium p-4 d-flex flex-row align-items-center gap-4 animate-fade-in border-0 shadow-sm" style="animation-delay: 0.3s">
      <div class="rounded-3 bg-success bg-opacity-10 text-success d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
        <lucide-icon [img]="Recycle" size="28"></lucide-icon>
      </div>
      <div>
        <div class="h3 fw-bold mb-0">{{ stats()?.Total_Basura || 0 | number }} kg</div>
        <div class="text-muted small fw-medium">Basura Recolectada</div>
      </div>
    </div>
  </div>
</div>

<div class="row g-4">
  <div class="col-12 col-xl-8">
    <div class="glass-panel p-4 h-100 shadow-sm border-0">
      <h3 class="h5 fw-bold mb-4 d-flex align-items-center gap-2 text-secondary">
        <lucide-icon [img]="Users" size="18"></lucide-icon>
        Crecimiento de Voluntarios
      </h3>
      <div style="height: 350px;">
        <canvas #userGrowthChart></canvas>
      </div>
    </div>
  </div>

  <div class="col-12 col-md-6 col-xl-4">
    <div class="glass-panel p-4 h-100 shadow-sm border-0">
      <h3 class="h5 fw-bold mb-4 d-flex align-items-center gap-2 text-secondary">
        <lucide-icon [img]="BarChart3" size="18"></lucide-icon>
        Eventos por Mes
      </h3>
      <div style="height: 350px;">
        <canvas #eventsByMonthChart></canvas>
      </div>
    </div>
  </div>

  <div class="col-12 col-md-6 col-xl-6">
    <div class="glass-panel p-4 shadow-sm border-0">
      <h3 class="h5 fw-bold mb-4 d-flex align-items-center gap-2 text-secondary">
        <lucide-icon [img]="PieChart" size="18"></lucide-icon>
        Eventos por Categoría
      </h3>
      <div style="height: 300px;">
        <canvas #eventsByCategoryChart></canvas>
      </div>
    </div>
  </div>

  <div class="col-12 col-md-6 col-xl-6">
    <div class="glass-panel p-4 shadow-sm border-0">
      <h3 class="h5 fw-bold mb-4 d-flex align-items-center gap-2 text-secondary">
        <lucide-icon [img]="PieChart" size="18"></lucide-icon>
        Noticias por Categoría
      </h3>
      <div style="height: 300px;">
        <canvas #newsByCategoryChart></canvas>
      </div>
    </div>
  </div>
</div>
