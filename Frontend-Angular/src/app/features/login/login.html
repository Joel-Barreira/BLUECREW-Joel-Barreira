<div class="login-wrapper d-flex align-items-center justify-content-center">
  <div class="login-container glass-panel shadow-lg border-0 p-5">
    <div class="login-header text-center mb-5">
      <div class="logo mb-4">
        <h1 class="logo-text text-uppercase fw-bold m-0">
          <span class="text-primary">Blue</span><span class="text-secondary">Crew</span>
        </h1>
      </div>
      <h2 class="h4 fw-bold text-dark mb-2">Panel de Administración</h2>
      <p class="text-muted small">Ingresa tus credenciales para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group mb-4">
        <label for="email" class="form-label small fw-bold text-muted text-uppercase">Correo Electrónico</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          class="form-control form-control-lg rounded-3 border-0 bg-light px-4 py-3 shadow-none" 
          [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
          placeholder="admin@bluecrew.com" 
          autocomplete="email"
        />
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback ps-2">
          <div *ngIf="f['email'].errors['required']">El correo es requerido</div>
          <div *ngIf="f['email'].errors['email']">El formato no es válido</div>
        </div>
      </div>

      <div class="form-group mb-4">
        <label for="password" class="form-label small fw-bold text-muted text-uppercase">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          class="form-control form-control-lg rounded-3 border-0 bg-light px-4 py-3 shadow-none" 
          [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
          placeholder="••••••••" 
          autocomplete="current-password"
        />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback ps-2">
          <div *ngIf="f['password'].errors['required']">La contraseña es requerida</div>
        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger py-3 px-4 rounded-3 border-0 d-flex align-items-center gap-2 small mb-4">
        <lucide-icon [img]="ShieldAlert" size="18"></lucide-icon>
        {{ error }}
      </div>

      <button type="submit" [disabled]="loading" class="btn btn-primary btn-lg w-100 rounded-pill py-3 fw-bold shadow-sm mt-2 text-white">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
        {{ loading ? 'Iniciando...' : 'Iniciar Sesión' }}
      </button>
    </form>
    
    <div class="login-footer mt-5 text-center">
      <p class="text-muted smaller mb-0">Acceso restringido solo a personal autorizado.</p>
    </div>
  </div>
  
  <div class="ambient-light light-1"></div>
  <div class="ambient-light light-2"></div>
</div>
